<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900"><rect width="1400" height="900" fill="#f8f5ef" /><path d="M 302 212 L 372 212" fill="none" stroke="#155e75" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><path d="M 604 212 L 684 212" fill="none" stroke="#7a8f3d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><path d="M 928 212 L 1004 212" fill="none" stroke="#e76f51" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><path d="M 474 404 L 622 392" fill="none" stroke="#7a8f3d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><path d="M 800 390 L 980 390" fill="none" stroke="#e76f51" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><path d="M 1160 390 L 1168 390" fill="none" stroke="#7c6eb0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /><text x="94" y="62" font-size="34" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#1f2933"><tspan x="94" dy="0">RELA CRISPR knockout workflow</tspan></text><text x="94" y="116" font-size="16" font-weight="500" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#4d5d68"><tspan x="94" dy="0">Real biological problem: test whether RELA loss dampens TNF-alpha-driven NF-kappaB activation in macrophages.</tspan></text><rect x="92" y="176" width="210" height="70" rx="24" fill="#d2edf5" stroke="#155e75" stroke-width="2" /><text x="197" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">1. Design sgRNA</text><rect x="372" y="176" width="232" height="70" rx="24" fill="#edf4de" stroke="#7a8f3d" stroke-width="2" /><text x="488" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">2. Deliver Cas9 + select</text><rect x="684" y="176" width="244" height="70" rx="24" fill="#fae0d7" stroke="#e76f51" stroke-width="2" /><text x="806" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">3. Stimulate with TNF-alpha</text><rect x="1004" y="176" width="256" height="70" rx="24" fill="#efe7ff" stroke="#7c6eb0" stroke-width="2" /><text x="1132" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">4. Quantify pathway output</text><image x="110" y="312" width="160" height="152" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-0/Genetics/David-Eccles--gringer-/DNA_symbolic_extending.svg" preserveAspectRatio="xMidYMid meet" /><image x="338" y="338" width="220" height="132" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-0/Genetics/Marcel_Tisch/CRISPR_Cas9.svg" preserveAspectRatio="xMidYMid meet" /><image x="622" y="298" width="178" height="178" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-3.0/Blood_Immunology/Servier/macrophage.svg" preserveAspectRatio="xMidYMid meet" /><image x="980" y="320" width="180" height="140" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-4.0/General_items/Pooja/western_blotting.svg" preserveAspectRatio="xMidYMid meet" /><image x="1168" y="276" width="166" height="220" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-4.0/Lab_apparatus/DBCLS/confocal-scanning-laser-microscope-CSLM.svg" preserveAspectRatio="xMidYMid meet" /><text x="128" y="480" font-size="14" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#415361"><tspan x="128" dy="0">Target RELA exon</tspan></text><text x="314" y="490" font-size="14" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#415361"><tspan x="314" dy="0">Lentiviral delivery or ribonucleoprotein</tspan></text><text x="624" y="492" font-size="14" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#415361"><tspan x="624" dy="0">TNF-alpha 10 ng/mL for 4 h</tspan></text><text x="966" y="476" font-size="14" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#415361"><tspan x="966" dy="0">p65 / IKBalpha immunoblot</tspan></text><text x="1142" y="514" font-size="14" font-weight="700" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#415361"><tspan x="1142" dy="0">Nuclear localization imaging</tspan></text><rect x="870" y="604" width="356" height="62" rx="24" fill="#dff1eb" stroke="#159570" stroke-width="2" /><text x="1048" y="635" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">Expected result: reduced phospho-p65 and IL6</text><text x="94" y="742" font-size="16" font-weight="500" font-family="&quot;Avenir Next&quot;, &quot;Segoe UI&quot;, sans-serif" text-anchor="start" fill="#4d5d68"><tspan x="94" dy="0">Editing exercise: duplicate the last card to add qPCR, ELISA, or single-cell RNA-seq as a fifth readout.</tspan></text></svg>