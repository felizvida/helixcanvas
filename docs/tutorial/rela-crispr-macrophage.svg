th="2" /><text x="806" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">3. Stimulate with TNF-alpha</text><rect x="1004" y="176" width="256" height="70" rx="24" fill="#efe7ff" stroke="#7c6eb0" stroke-width="2" /><text x="1132" y="211" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">4. Quantify pathway output</text><image x="110" y="312" width="160" height="152" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-0/Genetics/David-Eccles--gringer-/DNA_symbolic_extending.svg" preserveAspectRatio="xMidYMid meet" /><image x="338" y="338" width="220" height="132" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-0/Genetics/Marcel_Tisch/CRISPR_Cas9.svg" preserveAspectRatio="xMidYMid meet" /><image x="622" y="298" width="178" height="178" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-3.0/Blood_Immunology/Servier/macrophage.svg" preserveAspectRatio="xMidYMid meet" /><image x="980" y="320" width="180" height="140" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-4.0/General_items/Pooja/western_blotting.svg" preserveAspectRatio="xMidYMid meet" /><image x="1168" y="276" width="166" height="220" href="https://raw.githubusercontent.com/duerrsimon/bioicons/main/static/icons/cc-by-4.0/Lab_apparatus/DBCLS/confocal-scanning-laser-microscope-CSLM.svg" preserveAspectRatio="xMidYMid meet" /><text x="128" y="480" font-size="14" font-weight="700" fill="#415361">Target RELA exon</text><text x="314" y="490" font-size="14" font-weight="700" fill="#415361">Lentiviral delivery or ribonucleoprotein</text><text x="624" y="492" font-size="14" font-weight="700" fill="#415361">TNF-alpha 10 ng/mL for 4 h</text><text x="966" y="476" font-size="14" font-weight="700" fill="#415361">p65 / IKBalpha immunoblot</text><text x="1142" y="514" font-size="14" font-weight="700" fill="#415361">Nuclear localization imaging</text><rect x="870" y="604" width="356" height="62" rx="24" fill="#dff1eb" stroke="#159570" stroke-width="2" /><text x="1048" y="635" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="700" fill="#1f2933">Expected result: reduced phospho-p65 and IL6</text><text x="94" y="742" font-size="16" font-weight="500" fill="#4d5d68">Editing exercise: duplicate the last card to add qPCR, ELISA, or single-cell RNA-seq as a fifth readout.</text></svg>