name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate asset packs
        run: npm run check:packs

      - name: Rebuild library manifests
        run: npm run build:library

      - name: Check generated manifests are committed
        run: git diff --exit-code -- public/data/bioicons.library.json public/data/bioicons.stats.json public/data/library.packs.json public/data/library.stats.json

      - name: Run tests and build
        run: npm run check
